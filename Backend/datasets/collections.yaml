# ---------------------------------------------------------------------------
# Dataset registry — one block per NASA collection.
#
# To add a new dataset:
#   1. Add a block here following the same structure.
#   2. Restart the backend — no code changes needed.
#
# To onboard automatically from CMR, run:
#   python scripts/generate_collection.py --short-name <NAME> --version <VER>
#
# Required fields:
#   collection_id, primary_var, units, fill_value, valid_min, valid_max
#
# Optional fields (default shown):
#   variables: []                  # subset passed to Harmony; empty = all
#   groups: []                     # HDF groups to merge (OMI HCHO pattern)
#   quality_flag_var: null         # variable to use for QA masking
#   qa_good_values: null           # T25 Tier 1: flag values that pass (pinned, "verified")
#   qa_bad_values: null            # ...or the values that fail, if easier to state
#   supports_variable_subsetting: false
#   description: ""
#   provider: ""                   # DAAC/agency, e.g. "NASA GES DISC" (T32 provenance display)
#   instrument: ""                 # instrument/platform, e.g. "MODIS/Terra" (T32 provenance display)
# ---------------------------------------------------------------------------

# ── NO2 ─────────────────────────────────────────────────────────────────────

OMI_NO2:
