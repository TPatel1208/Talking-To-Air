name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libproj-dev proj-data proj-bin libgeos-dev \
            libgdal-dev gdal-bin libhdf5-dev libnetcdf-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt
          pip install -e Backend
          pip install coverage

      - name: Lint Python syntax
        run: python -m compileall -q Backend

      - name: Lint Python style
        run: python -m ruff check Backend/

      - name: Type check selected backend packages
        run: python -m mypy Backend/services/ Backend/repositories/ Backend/models/ --ignore-missing-imports --config-file Backend/mypy.ini

      - name: Run unit and integration tests with coverage
        env:
          PYTHONPATH: Backend
        run: coverage run -m unittest discover -s Backend/tests -p "test_*.py"

      - name: Coverage report
        env:
          PYTHONPATH: Backend
        run: coverage report

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: Frontend
        run: npm test

      - name: Build frontend bundle
        working-directory: Frontend
        run: npm run build

      - name: Build frontend Docker image
        env:
          DB_PASSWORD: ci-placeholder
        run: docker compose build frontend
